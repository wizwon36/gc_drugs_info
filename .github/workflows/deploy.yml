name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 배포용 폴더 준비
        run: |
          mkdir -p _site
          # ✅ rsync로 복사 — .git, .github, _site 폴더 제외
          rsync -a --exclude='.git' --exclude='.github' --exclude='_site' . _site/
          # ✅ config.template.js의 __API_BASE__를 실제 URL로 교체
          sed 's|__API_BASE__|${{ secrets.API_BASE }}|g' \
            _site/assets/js/config.template.js > _site/assets/js/config.js

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: 파일 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
