name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: API URL 주입
        run: |
          sed 's|__API_BASE__|${{ secrets.API_BASE }}|g' \
            assets/js/config.template.js > assets/js/config.js

      - name: Pages 설정
        uses: actions/configure-pages@v5

      - name: 파일 업로드
        uses: actions/upload-pages-artifact@v3
        with:
          # ✅ 전체 디렉토리 업로드 (config.js 포함)
          path: .

      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
