name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: API URL 주입
        run: |
          sed 's|__API_BASE__|${{ secrets.API_BASE }}|g' \
            assets/js/config.template.js > assets/js/config.js

      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          # ✅ 추가: .gitignore에 등록된 파일도 배포에 포함
          exclude_assets: ''
